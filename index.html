<!DOCTYPE html>
<html>

<head>
  <title>Arovia Pharma</title>

  <style>

    body {
      background-color: #e0f4f7;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    header {
      background-color: #ffffff;
      padding: 40px;
      text-align: center;
    }

    .header-logo {
      width: 120px;
      margin-bottom: 10px;
    }

    header h1 {
      color: #005B60;
      margin: 0;
    }

    header p {
      color: #0A2540;
      margin-top: 5px;
    }

    nav {
      background-color: #0A2540;
      padding: 15px;
      text-align: center;
    }

    nav a {
      color: white;
      text-decoration: none;
      padding: 0 15px;
      font-weight: bold;
    }

    nav a:hover {
      color: #90e0ef;
    }

    .brand-banner {
      width: 100%;
      height: 200px;
      background-image: url('1000447689.jpg');
      background-size: contain;
      background-repeat: repeat-x;
      background-position: center;
      margin-bottom: 30px;
    }

    section {
      padding: 40px;
      text-align: center;
    }

    .product-box {
      background: white;
      padding: 20px;
      margin: 15px auto;
      border-radius: 10px;
      box-shadow: 0px 2px 8px rgba(0,0,0,0.1);
      max-width: 500px;
    }

    footer {
      background: #0A2540;
      color: white;
      text-align: center;
      padding: 20px;
    }

  </style>
</head>

<body>

  <header>
    <img src="logo 2.jpeg" alt="Arovia Pharma Logo" class="header-logo">

    <h1>Arovia Pharma Pvt Ltd</h1>
    <p>The Path to Health</p>
  </header>

  <div class="brand-banner"></div>

  <nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Products</a>
    <a href="#">Contact</a>
  </nav>

  <section>

    <div class="product-box">
      <h2>Welcome to Arovia Pharma</h2>
      <p>
        We are committed to delivering quality healthcare
        products with trust, innovation, and excellence.
      </p>
    </div>

  </section>

  <footer>
    © 2025 Arovia Pharma Pvt Ltd. All Rights Reserved.
  </footer>

</body>
</html>
